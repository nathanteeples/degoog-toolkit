<div class="ttt-card"
     data-default-difficulty="{{default_difficulty}}"
     data-default-symbol="{{default_symbol}}"
     data-t-player1-x="{{ t:plugin-tic-tac-toe.player1X }}"
     data-t-player2-o="{{ t:plugin-tic-tac-toe.player2O }}"
     data-t-x-you="{{ t:plugin-tic-tac-toe.xYou }}"
     data-t-o-ai="{{ t:plugin-tic-tac-toe.oAi }}"
     data-t-x-ai="{{ t:plugin-tic-tac-toe.xAi }}"
     data-t-o-you="{{ t:plugin-tic-tac-toe.oYou }}"
     data-t-ai-thinking="{{ t:plugin-tic-tac-toe.aiThinking }}"
     data-t-player1-turn="{{ t:plugin-tic-tac-toe.player1Turn }}"
     data-t-player2-turn="{{ t:plugin-tic-tac-toe.player2Turn }}"
     data-t-your-turn="{{ t:plugin-tic-tac-toe.yourTurn }}"
     data-t-draw-result="{{ t:plugin-tic-tac-toe.drawResult }}"
     data-t-player1-wins="{{ t:plugin-tic-tac-toe.player1Wins }}"
     data-t-player2-wins="{{ t:plugin-tic-tac-toe.player2Wins }}"
     data-t-you-win="{{ t:plugin-tic-tac-toe.youWin }}"
     data-t-ai-wins="{{ t:plugin-tic-tac-toe.aiWins }}"
>
  <div class="ttt-header">
    <div class="ttt-title">{{ t:plugin-tic-tac-toe.ticTacToe }}</div>
    <div class="ttt-settings">
      <select id="ttt-difficulty-select" class="ttt-select" aria-label="Difficulty Selection">
        <option value="easy">{{ t:plugin-tic-tac-toe.easy }}</option>
        <option value="medium">{{ t:plugin-tic-tac-toe.medium }}</option>
        <option value="hard">{{ t:plugin-tic-tac-toe.hard }}</option>
        <option value="impossible">{{ t:plugin-tic-tac-toe.impossible }}</option>
        <option value="pvp">{{ t:plugin-tic-tac-toe.pvp }}</option>
      </select>
    </div>
  </div>

  <div class="ttt-turn-indicator" id="ttt-status" role="status" aria-live="polite">{{ t:plugin-tic-tac-toe.yourTurn }}</div>

  <div class="ttt-score-container">
    <div class="ttt-score-box" id="ttt-score-p1">
      <span class="ttt-score-label">{{ t:plugin-tic-tac-toe.xYou }}</span>
      <span class="ttt-score-val" id="ttt-score-val-x">0</span>
    </div>
    <div class="ttt-score-box" id="ttt-score-draw">
      <span class="ttt-score-label">{{ t:plugin-tic-tac-toe.draws }}</span>
      <span class="ttt-score-val" id="ttt-score-val-draws">0</span>
    </div>
    <div class="ttt-score-box" id="ttt-score-p2">
      <span class="ttt-score-label">{{ t:plugin-tic-tac-toe.oAi }}</span>
      <span class="ttt-score-val" id="ttt-score-val-o">0</span>
    </div>
  </div>

  <div class="ttt-game-area">
    <div class="ttt-grid-wrapper">
      <div class="ttt-grid" role="grid" aria-label="{{ t:plugin-tic-tac-toe.ticTacToe }}">
        <!-- Cells -->
        <button type="button" class="ttt-cell" data-index="0" role="gridcell" aria-label="Cell 1"></button>
        <button type="button" class="ttt-cell" data-index="1" role="gridcell" aria-label="Cell 2"></button>
        <button type="button" class="ttt-cell" data-index="2" role="gridcell" aria-label="Cell 3"></button>
        <button type="button" class="ttt-cell" data-index="3" role="gridcell" aria-label="Cell 4"></button>
        <button type="button" class="ttt-cell" data-index="4" role="gridcell" aria-label="Cell 5"></button>
        <button type="button" class="ttt-cell" data-index="5" role="gridcell" aria-label="Cell 6"></button>
        <button type="button" class="ttt-cell" data-index="6" role="gridcell" aria-label="Cell 7"></button>
        <button type="button" class="ttt-cell" data-index="7" role="gridcell" aria-label="Cell 8"></button>
        <button type="button" class="ttt-cell" data-index="8" role="gridcell" aria-label="Cell 9"></button>

        <!-- Win Line Overlay -->
        <div class="ttt-win-line" id="ttt-win-line"></div>
      </div>
    </div>
  </div>

  <div class="ttt-footer-actions">
    <button type="button" class="ttt-btn ttt-btn-secondary" id="ttt-btn-symbol-x" data-symbol="X" aria-pressed="false">{{ t:plugin-tic-tac-toe.playAsX }}</button>
    <button type="button" class="ttt-btn ttt-btn-secondary" id="ttt-btn-symbol-o" data-symbol="O" aria-pressed="false">{{ t:plugin-tic-tac-toe.playAsO }}</button>
    <button type="button" class="ttt-btn ttt-btn-primary" id="ttt-btn-reset-board">{{ t:plugin-tic-tac-toe.restartGame }}</button>
    <button type="button" class="ttt-btn ttt-btn-text" id="ttt-btn-reset-scores" title="{{ t:plugin-tic-tac-toe.resetScores }}" aria-label="{{ t:plugin-tic-tac-toe.resetScores }}">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"></path><path d="M21 3v5h-5"></path><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"></path><path d="M3 21v-5h5"></path></svg>
    </button>
  </div>
</div>
