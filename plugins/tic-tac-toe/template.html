<div class="ttt-card" data-default-difficulty="{{default_difficulty}}" data-default-symbol="{{default_symbol}}">
  <div class="ttt-header">
    <div class="ttt-title">Tic-Tac-Toe</div>
    <div class="ttt-settings">
      <select id="ttt-difficulty-select" class="ttt-select" aria-label="Difficulty Selection">
        <option value="easy">Easy</option>
        <option value="medium">Medium</option>
        <option value="hard">Hard</option>
        <option value="impossible">Impossible</option>
        <option value="pvp">Play vs Friend</option>
      </select>
    </div>
  </div>

  <div class="ttt-turn-indicator" id="ttt-status">Your turn</div>

  <div class="ttt-score-container">
    <div class="ttt-score-box" id="ttt-score-p1">
      <span class="ttt-score-label">X (You)</span>
      <span class="ttt-score-val" id="ttt-score-val-x">0</span>
    </div>
    <div class="ttt-score-box" id="ttt-score-draw">
      <span class="ttt-score-label">Draws</span>
      <span class="ttt-score-val" id="ttt-score-val-draws">0</span>
    </div>
    <div class="ttt-score-box" id="ttt-score-p2">
      <span class="ttt-score-label">O (AI)</span>
      <span class="ttt-score-val" id="ttt-score-val-o">0</span>
    </div>
  </div>

  <div class="ttt-game-area">
    <div class="ttt-grid-wrapper">
      <div class="ttt-grid">
        <!-- Cells -->
        <button class="ttt-cell" data-index="0" aria-label="Cell 1"></button>
        <button class="ttt-cell" data-index="1" aria-label="Cell 2"></button>
        <button class="ttt-cell" data-index="2" aria-label="Cell 3"></button>
        <button class="ttt-cell" data-index="3" aria-label="Cell 4"></button>
        <button class="ttt-cell" data-index="4" aria-label="Cell 5"></button>
        <button class="ttt-cell" data-index="5" aria-label="Cell 6"></button>
        <button class="ttt-cell" data-index="6" aria-label="Cell 7"></button>
        <button class="ttt-cell" data-index="7" aria-label="Cell 8"></button>
        <button class="ttt-cell" data-index="8" aria-label="Cell 9"></button>

        <!-- Win Line Overlay -->
        <div class="ttt-win-line" id="ttt-win-line"></div>
      </div>
    </div>
  </div>

  <div class="ttt-footer-actions">
    <button class="ttt-btn ttt-btn-secondary" id="ttt-btn-symbol-x" data-symbol="X">Play as X</button>
    <button class="ttt-btn ttt-btn-secondary" id="ttt-btn-symbol-o" data-symbol="O">Play as O</button>
    <button class="ttt-btn ttt-btn-primary" id="ttt-btn-reset-board">Restart Game</button>
    <button class="ttt-btn ttt-btn-text" id="ttt-btn-reset-scores" title="Reset Scores">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"></path><path d="M21 3v5h-5"></path><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"></path><path d="M3 21v-5h5"></path></svg>
    </button>
  </div>
</div>
