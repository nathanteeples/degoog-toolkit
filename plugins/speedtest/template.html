<div
  class="speedtest-card"
  data-speedtest-card="true"
  data-speedtest-version="__PLUGIN_VERSION__"
>
  <div class="speedtest-card__gauge-shell">
    <svg
      class="speedtest-card__gauge"
      viewBox="0 0 320 210"
      aria-hidden="true"
      focusable="false"
    >
      <path
        class="speedtest-card__gauge-track"
        d="M 55 170 A 105 105 0 0 1 265 170"
      />
      <path
        class="speedtest-card__gauge-fill"
        data-speedtest-arc
        pathLength="100"
        d="M 55 170 A 105 105 0 0 1 265 170"
      />
      <circle
        class="speedtest-card__gauge-tip"
        data-speedtest-tip
        cx="55"
        cy="170"
        r="4.5"
      />
      <g class="speedtest-card__ticks">
        <text x="25" y="170">0</text>
        <text x="35" y="118">5</text>
        <text x="65" y="75">10</text>
        <text x="108" y="45">50</text>
        <text x="160" y="35">100</text>
        <text x="212" y="45">250</text>
        <text x="255" y="75">500</text>
        <text x="285" y="118">750</text>
        <text x="295" y="170">1000</text>
      </g>
    </svg>

    <div class="speedtest-card__center">
      <div class="speedtest-card__phase" data-speedtest-phase></div>
      <div class="speedtest-card__value" data-speedtest-value>0.0</div>
      <div class="speedtest-card__unit">{{t_megabits_per_sec}}</div>
    </div>
  </div>

  <div class="speedtest-card__stats">
    <div class="speedtest-card__stat">
      <div class="speedtest-card__stat-value" data-speedtest-download>0.0</div>
      <div class="speedtest-card__stat-label">{{t_mbps_download}}</div>
    </div>
    <div class="speedtest-card__stat">
      <div class="speedtest-card__stat-value" data-speedtest-upload>0.0</div>
      <div class="speedtest-card__stat-label">{{t_mbps_upload}}</div>
    </div>
  </div>

  <div class="speedtest-card__details">
    <div class="speedtest-card__detail">
      <span>{{t_latency_label}}</span>
      <strong data-speedtest-latency>--</strong>
    </div>
    <div class="speedtest-card__detail">
      <span>{{t_server_label}}</span>
      <strong data-speedtest-server>{{t_auto_server}}</strong>
    </div>
  </div>

  <div class="speedtest-card__assessment" data-speedtest-assessment>
    {{t_measures_latency}}
  </div>

  <div class="speedtest-card__status" data-speedtest-status>
    {{t_ready_to_measure}}
  </div>

  <div class="speedtest-card__controls speedtest-card__controls--footer">
    <label class="speedtest-card__server-picker">
      <span class="speedtest-card__server-picker-label">{{t_server_label}}</span>
      <select class="speedtest-card__server-select" data-speedtest-server-select></select>
    </label>
    <div class="speedtest-card__button-group">
      <button class="speedtest-card__action" type="button" data-speedtest-action>
        {{t_run_again}}
      </button>
      <button
        class="speedtest-card__action speedtest-card__action--cancel"
        type="button"
        data-speedtest-cancel
        hidden
      >
        {{t_cancel}}
      </button>
    </div>
  </div>

  <details class="speedtest-card__debug" __DEBUG_HIDDEN__>
    <summary class="speedtest-card__debug-summary">{{t_debug_details}}</summary>
    <pre class="speedtest-card__debug-output" data-speedtest-debug-output>
{{t_run_to_capture}}
    </pre>
  </details>
</div>
