<div class="uxs-wrap slot-full-width" data-measure="{{measure}}">
  <div class="uxs-main">
    <div class="uxs-top-bar">
      <select class="uxs-category-select" id="uxs-category-select" aria-label="Measurement category"></select>
    </div>

    <div class="uxs-row" id="uxs-from-row">
      <div class="uxs-input-wrap uxs-input-wrap--editable">
        <div class="uxs-label">Amount</div>
        <input class="uxs-amount" id="uxs-amount" type="number" value="{{amount_for_js}}" step="any"/>
      </div>
      <div class="uxs-select-wrap">
        <select class="uxs-unit-select" id="uxs-from-select" data-selected="{{from_code}}" aria-label="From unit"></select>
      </div>
    </div>

    <div class="uxs-divider">
      <button class="uxs-swap" id="uxs-swap" aria-label="Swap units">
        <span class="uxs-swap-inner">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 4.5h9M8 2l3 2.5L8 7M11 8.5H2M5 6l-3 2.5L5 11"/>
          </svg>
        </span>
      </button>
    </div>

    <div class="uxs-row">
      <div class="uxs-input-wrap uxs-input-wrap--result">
        <div class="uxs-label">Result</div>
        <div class="uxs-result-line">
          <div class="uxs-result" id="uxs-result">{{result}}</div>
          <button class="uxs-copy" id="uxs-copy-result" type="button" aria-label="Copy result" title="Copy result">
            <svg class="uxs-copy-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
            </svg>
            <svg class="uxs-copy-done" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M20 6L9 17l-5-5"></path>
            </svg>
          </button>
        </div>
      </div>
      <div class="uxs-select-wrap">
        <select class="uxs-unit-select" id="uxs-to-select" data-selected="{{to_code}}" aria-label="To unit"></select>
      </div>
    </div>

    <div class="uxs-formula-bar" id="uxs-formula">
      {{amount}} {{from_name}} = {{result}} {{to_name}}
    </div>
  </div>
</div>
