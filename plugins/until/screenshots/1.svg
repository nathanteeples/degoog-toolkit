<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Until plugin preview</title>
  <desc id="desc">A countdown card for a search query showing days until 2040.</desc>
  <rect width="1200" height="675" fill="#f8fafd"/>
  <rect x="125" y="118" width="950" height="112" rx="28" fill="#fff" stroke="#dfe5ef"/>
  <text x="176" y="187" font-family="Arial, sans-serif" font-size="44" fill="#202124">days until 2040</text>
  <rect x="125" y="282" width="950" height="255" rx="8" fill="#fff" stroke="#d9e1ec"/>
  <rect x="125" y="282" width="7" height="255" rx="3.5" fill="#4285f4"/>
  <text x="174" y="345" font-family="Arial, sans-serif" font-size="22" font-weight="700" letter-spacing="0" fill="#5f6368">UNTIL SUNDAY, JANUARY 1, 2040</text>
  <text x="174" y="428" font-family="Arial, sans-serif" font-size="76" font-weight="700" fill="#202124">4,970</text>
  <text x="428" y="427" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#6f7782">days</text>
  <text x="174" y="480" font-family="Arial, sans-serif" font-size="25" fill="#6f7782">from now</text>
  <g font-family="Arial, sans-serif">
    <rect x="680" y="330" width="148" height="68" rx="8" fill="#f2f6ff" stroke="#dfe5ef"/>
    <text x="698" y="356" font-size="14" font-weight="700" fill="#6f7782">YEARS</text>
    <text x="698" y="384" font-size="25" font-weight="700" fill="#202124">13.6</text>
    <rect x="848" y="330" width="148" height="68" rx="8" fill="#f2f6ff" stroke="#dfe5ef"/>
    <text x="866" y="356" font-size="14" font-weight="700" fill="#6f7782">WEEKS</text>
    <text x="866" y="384" font-size="25" font-weight="700" fill="#202124">710</text>
    <rect x="680" y="418" width="148" height="68" rx="8" fill="#f2f6ff" stroke="#dfe5ef"/>
    <text x="698" y="444" font-size="14" font-weight="700" fill="#6f7782">HOURS</text>
    <text x="698" y="472" font-size="25" font-weight="700" fill="#202124">119,288</text>
    <rect x="848" y="418" width="148" height="68" rx="8" fill="#f2f6ff" stroke="#dfe5ef"/>
    <text x="866" y="444" font-size="14" font-weight="700" fill="#6f7782">SECONDS</text>
    <text x="866" y="472" font-size="25" font-weight="700" fill="#202124">429M</text>
  </g>
</svg>
