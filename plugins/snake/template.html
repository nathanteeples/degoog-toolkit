<div class="snake-card" data-snake-widget data-initial-speed="{{initial_speed_ms}}">
  <div class="snake-header">
    <div class="snake-header-row">
      <div class="snake-title">
        <span>{{t_snake}}</span>
      </div>
      <div class="snake-header-actions">
        <button id="snake-fullscreen-btn" class="snake-btn snake-btn-secondary" title="{{t_toggle_fs}}">{{t_full_screen}}</button>
        <button id="snake-pause-btn" class="snake-btn snake-btn-secondary" disabled>{{t_pause}}</button>
        <button id="snake-sound-btn" class="snake-btn snake-btn-icon" title="Toggle Sound">
          <svg class="snake-sound-on" viewBox="0 0 24 24" width="24" height="24">
            <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z" fill="currentColor"/>
          </svg>
          <svg class="snake-sound-off snake-hidden" viewBox="0 0 24 24" width="24" height="24">
            <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.21.05-.42.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z" fill="currentColor"/>
          </svg>
        </button>
      </div>
    </div>
    <div class="snake-scoreboard">
      <div class="snake-score-box">
        <span class="snake-score-label">{{t_score}}</span>
        <span id="snake-current-score" class="snake-score-val">0</span>
      </div>
      <div class="snake-score-box">
        <span class="snake-score-label">{{t_high}}</span>
        <span id="snake-high-score" class="snake-score-val">0</span>
      </div>
    </div>
  </div>

  <div class="snake-body">
    <div class="snake-game-container">
      <canvas id="snake-canvas" width="400" height="400"></canvas>

      <div id="snake-overlay-start" class="snake-overlay">
        <div class="snake-overlay-panel snake-overlay-panel--start">
          <div class="snake-overlay-icon snake-overlay-icon--start" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="28" height="28" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M6 14c0-2.2 1.8-4 4-4h2.5a2.5 2.5 0 1 0 0-5H10a6 6 0 0 0-6 6v1.5c0 1.4 1.1 2.5 2.5 2.5H8v2H6.5A4.5 4.5 0 0 1 2 16.5V14Z" fill="currentColor"/>
              <circle cx="17.5" cy="8.5" r="1.35" fill="#0f172a"/>
              <circle cx="20" cy="8.5" r="1.35" fill="#0f172a"/>
            </svg>
          </div>
          <h2 class="snake-overlay-title">{{t_snake}}</h2>
          <p class="snake-overlay-meta">{{t_press_start}}</p>
          <button id="snake-start-btn" class="snake-btn snake-btn-play">{{t_start_game}}</button>
        </div>
      </div>

      <div id="snake-overlay-gameover" class="snake-overlay snake-hidden">
        <div class="snake-overlay-panel snake-overlay-panel--lose">
          <div class="snake-overlay-icon snake-overlay-icon--lose" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M8 8l8 8M16 8l-8 8" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/>
            </svg>
          </div>
          <h2 class="snake-overlay-title">{{t_game_over}}</h2>
          <p class="snake-overlay-scoreline">
            <span id="snake-final-score" class="snake-overlay-score">0</span>
            <span class="snake-overlay-score-label">{{t_points}}</span>
          </p>
          <p id="snake-gameover-extra" class="snake-overlay-meta">Best: 0</p>
          <button id="snake-restart-btn" class="snake-btn snake-btn-play">{{t_play_again}}</button>
        </div>
      </div>

      <div id="snake-overlay-win" class="snake-overlay snake-hidden">
        <div class="snake-overlay-panel snake-overlay-panel--win">
          <div class="snake-overlay-icon snake-overlay-icon--win" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 3.5 14.6 9l5.9.5-4.5 3.8 1.4 5.7L12 16.8 6.6 19l1.4-5.7L3.5 9.5 9.4 9 12 3.5Z" fill="currentColor"/>
            </svg>
          </div>
          <h2 class="snake-overlay-title">{{t_you_win}}</h2>
          <p class="snake-overlay-meta">{{t_board_cleared}}</p>
          <p class="snake-overlay-scoreline">
            <span id="snake-win-score" class="snake-overlay-score">0</span>
            <span class="snake-overlay-score-label">{{t_points}}</span>
          </p>
          <p id="snake-win-extra" class="snake-overlay-meta"></p>
          <button id="snake-win-restart-btn" class="snake-btn snake-btn-play">{{t_play_again}}</button>
        </div>
      </div>

      <div id="snake-overlay-paused" class="snake-overlay snake-hidden">
        <div class="snake-overlay-panel snake-overlay-panel--pause">
          <div class="snake-overlay-icon snake-overlay-icon--pause" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="7" y="6" width="3.5" height="12" rx="1.2" fill="currentColor"/>
              <rect x="13.5" y="6" width="3.5" height="12" rx="1.2" fill="currentColor"/>
            </svg>
          </div>
          <h2 class="snake-overlay-title">{{t_paused}}</h2>
          <p class="snake-overlay-meta">{{t_press_resume}}</p>
          <button id="snake-resume-btn" class="snake-btn snake-btn-play">{{t_resume}}</button>
        </div>
      </div>
    </div>

    <div class="snake-dpad">
      <div class="snake-dpad-row">
        <button id="snake-dpad-up" class="snake-dpad-btn" aria-label="Up">
          <svg viewBox="0 0 24 24" width="24" height="24">
            <path d="M7 14l5-5 5 5H7z" fill="currentColor"/>
          </svg>
        </button>
      </div>
      <div class="snake-dpad-row">
        <button id="snake-dpad-left" class="snake-dpad-btn" aria-label="Left">
          <svg viewBox="0 0 24 24" width="24" height="24">
            <path d="M14 17l-5-5 5-5v10z" fill="currentColor"/>
          </svg>
        </button>
        <div class="snake-dpad-center"></div>
        <button id="snake-dpad-right" class="snake-dpad-btn" aria-label="Right">
          <svg viewBox="0 0 24 24" width="24" height="24">
            <path d="M10 17l5-5-5-5v10z" fill="currentColor"/>
          </svg>
        </button>
      </div>
      <div class="snake-dpad-row">
        <button id="snake-dpad-down" class="snake-dpad-btn" aria-label="Down">
          <svg viewBox="0 0 24 24" width="24" height="24">
            <path d="M7 10l5 5 5-5H7z" fill="currentColor"/>
          </svg>
        </button>
      </div>
    </div>
  </div>
</div>
