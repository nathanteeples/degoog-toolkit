<div class="snake-card slot-full-width" data-snake-widget data-initial-speed="{{initial_speed_ms}}">
  <div class="snake-header">
    <div class="snake-title">
      <span>Retro Snake</span>
    </div>
    <div class="snake-header-actions">
      <button id="snake-fullscreen-btn" class="snake-btn snake-btn-secondary" title="Toggle Fullscreen">Full Screen</button>
      <button id="snake-pause-btn" class="snake-btn snake-btn-secondary" disabled>Pause</button>
      <button id="snake-sound-btn" class="snake-btn snake-btn-icon" title="Toggle Sound">
        <!-- Sound On Icon -->
        <svg class="snake-sound-on" viewBox="0 0 24 24" width="24" height="24">
          <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z" fill="currentColor"/>
        </svg>
        <!-- Sound Off Icon -->
        <svg class="snake-sound-off snake-hidden" viewBox="0 0 24 24" width="24" height="24">
          <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.21.05-.42.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z" fill="currentColor"/>
        </svg>
      </button>
    </div>
    <div class="snake-scoreboard">
      <div class="snake-score-box">
        <span class="snake-score-label">Score</span>
        <span id="snake-current-score" class="snake-score-val">0</span>
      </div>
      <div class="snake-score-box">
        <span class="snake-score-label">High</span>
        <span id="snake-high-score" class="snake-score-val">0</span>
      </div>
    </div>
  </div>

  <div class="snake-body">
    <div class="snake-game-container">
      <canvas id="snake-canvas" width="400" height="400"></canvas>
      
      <!-- Start Overlay -->
      <div id="snake-overlay-start" class="snake-overlay">
        <div class="snake-overlay-content">
          <h2 class="snake-overlay-title">SNAKE</h2>
          <p class="snake-overlay-desc">Press Spacebar or tap Start to begin</p>
          <button id="snake-start-btn" class="snake-btn snake-btn-primary">Start Game</button>
        </div>
      </div>

      <!-- Game Over Overlay -->
      <div id="snake-overlay-gameover" class="snake-overlay snake-hidden">
        <div class="snake-overlay-content">
          <h2 class="snake-overlay-title snake-gameover-title">GAME OVER</h2>
          <p class="snake-overlay-desc">You scored <span id="snake-final-score">0</span> points!</p>
          <button id="snake-restart-btn" class="snake-btn snake-btn-primary">Play Again</button>
        </div>
      </div>

      <!-- Paused Overlay -->
      <div id="snake-overlay-paused" class="snake-overlay snake-hidden">
        <div class="snake-overlay-content">
          <h2 class="snake-overlay-title">PAUSED</h2>
          <p class="snake-overlay-desc">Press Spacebar or tap Resume to continue</p>
          <button id="snake-resume-btn" class="snake-btn snake-btn-primary">Resume</button>
        </div>
      </div>
    </div>

    <!-- On-screen D-Pad for Touchscreen Devices -->
    <div class="snake-dpad">
      <div class="snake-dpad-row">
        <button id="snake-dpad-up" class="snake-dpad-btn" aria-label="Up">
          <svg viewBox="0 0 24 24" width="24" height="24">
            <path d="M7 14l5-5 5 5H7z" fill="currentColor"/>
          </svg>
        </button>
      </div>
      <div class="snake-dpad-row">
        <button id="snake-dpad-left" class="snake-dpad-btn" aria-label="Left">
          <svg viewBox="0 0 24 24" width="24" height="24">
            <path d="M14 17l-5-5 5-5v10z" fill="currentColor"/>
          </svg>
        </button>
        <div class="snake-dpad-center"></div>
        <button id="snake-dpad-right" class="snake-dpad-btn" aria-label="Right">
          <svg viewBox="0 0 24 24" width="24" height="24">
            <path d="M10 17l5-5-5-5v10z" fill="currentColor"/>
          </svg>
        </button>
      </div>
      <div class="snake-dpad-row">
        <button id="snake-dpad-down" class="snake-dpad-btn" aria-label="Down">
          <svg viewBox="0 0 24 24" width="24" height="24">
            <path d="M7 10l5 5 5-5H7z" fill="currentColor"/>
          </svg>
        </button>
      </div>
    </div>
  </div>
</div>
