<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Sports slot live sweep demo</title>
  <style>
    :root {
      --sports-live-bar-size: 18px;
      --danger: #d93025;
    }

    body {
      font-family: system-ui, sans-serif;
      padding: 2rem;
      background: #f8f9fa;
    }

    h1 {
      font-size: 1rem;
      margin: 0 0 1.5rem;
    }

    .demo-row {
      display: flex;
      flex-wrap: wrap;
      gap: 2rem;
      align-items: flex-start;
    }

    .demo-block {
      min-width: 260px;
    }

    .demo-label {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #5f6368;
      margin-bottom: 0.5rem;
    }

    /* Reference: classic overflow clip + left sweep */
    .reference-container {
      width: 250px;
      height: 50px;
      overflow: hidden;
      background: #e8eaed;
      border-radius: 8px;
    }

    .reference-ball {
      width: 150px;
      height: 50px;
      position: relative;
      background: #34a853;
      animation: reference-sweep 2.5s linear infinite;
    }

    @keyframes reference-sweep {
      0%,
      100% {
        left: -150px;
      }

      50% {
        left: 250px;
      }
    }

    /* Sports slot implementation */
    .sports-slot__live-status {
      --sports-live-bar-size: 18px;
      display: inline-flex;
      flex-direction: column;
      align-items: stretch;
      gap: 0.2rem;
      min-width: 2.25rem;
      color: var(--danger);
    }

    .sports-slot__live-status-text {
      font-weight: 700;
      line-height: 1.1;
      text-align: center;
      white-space: nowrap;
    }

    .sports-slot__live-track {
      position: relative;
      overflow: hidden;
      width: 100%;
      height: 2px;
      border-radius: 999px;
      background: color-mix(in srgb, currentColor 20%, transparent);
    }

    .sports-slot__live-bar {
      position: relative;
      top: 0;
      width: var(--sports-live-bar-size);
      height: 100%;
      border-radius: 999px;
      background: currentColor;
      animation: sports-slot-live-sweep 2.5s ease-in-out infinite;
    }

    @keyframes sports-slot-live-sweep {
      0%,
      100% {
        left: calc(-1 * var(--sports-live-bar-size));
      }

      50% {
        left: 100%;
      }
    }
  </style>
</head>
<body>
  <h1>Live sweep animation demo (2.5s loop)</h1>
  <div class="demo-row">
    <div class="demo-block">
      <div class="demo-label">Reference (green bar)</div>
      <div class="reference-container">
        <div class="reference-ball"></div>
      </div>
    </div>
    <div class="demo-block">
      <div class="demo-label">Sports slot (red underline)</div>
      <span class="sports-slot__live-status">
        <span class="sports-slot__live-status-text">2nd • 45:00</span>
        <span class="sports-slot__live-track" aria-hidden="true">
          <span class="sports-slot__live-bar"></span>
        </span>
      </span>
    </div>
  </div>
</body>
</html>
