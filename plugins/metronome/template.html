<div class="metro-card" data-default-bpm="{{default_bpm}}">
  <div class="metro-header">
    <div class="metro-title">
      <svg class="metro-title-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" />
      </svg>
      <span>Metronome</span>
    </div>
    <div class="metro-tempo-text" data-metro-tempo-text>Moderato</div>
  </div>

  <div class="metro-display-section">
    <div class="metro-dots-container" data-metro-dots>
      <div class="metro-dot" data-index="0"></div>
      <div class="metro-dot" data-index="1"></div>
      <div class="metro-dot" data-index="2"></div>
      <div class="metro-dot" data-index="3"></div>
    </div>

    <div class="metro-bpm-container">
      <span class="metro-bpm-val" data-metro-bpm-val>{{default_bpm}}</span>
      <span class="metro-bpm-unit">BPM</span>
    </div>
  </div>

  <div class="metro-controls">
    <div class="metro-slider-group">
      <button class="metro-btn metro-adjust-btn" data-action="decrement" aria-label="Decrease tempo by 1 BPM">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
      </button>
      
      <input 
        type="range" 
        class="metro-slider" 
        min="40" 
        max="240" 
        value="{{default_bpm}}" 
        data-metro-slider
        aria-label="BPM slider"
      />
      
      <button class="metro-btn metro-adjust-btn" data-action="increment" aria-label="Increase tempo by 1 BPM">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
      </button>
    </div>

    <div class="metro-action-group">
      <button class="metro-play-btn" data-metro-play-btn aria-label="Play">
        <svg class="metro-play-icon" width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
          <polygon points="8 5 19 12 8 19 8 5"></polygon>
        </svg>
        <svg class="metro-pause-icon metro-hidden" width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
          <rect x="6" y="4" width="4" height="16" rx="1"></rect>
          <rect x="14" y="4" width="4" height="16" rx="1"></rect>
        </svg>
      </button>
    </div>
  </div>

  <div class="metro-footer">
    <div class="metro-footer-item">
      <label for="metro-beats-select" class="metro-label">Beats per bar</label>
      <select id="metro-beats-select" class="metro-select" data-metro-select>
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4" selected>4</option>
      </select>
    </div>

    <button class="metro-btn metro-tap-btn" data-metro-tap-btn>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
      </svg>
      <span>Tap Tempo</span>
    </button>
  </div>
</div>
