<div class="metro-card" data-default-bpm="{{default_bpm}}"
  data-t-play="{{ t:plugin-metronome.play }}"
  data-t-pause="{{ t:plugin-metronome.pause }}"
>
  <div class="metro-header">
    <div class="metro-title">
      <svg class="metro-title-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3.82 21h16.36a1 1 0 0 0 .96-1.28l-6-20a1 1 0 0 0-1.92 0l-6 20A1 1 0 0 0 3.82 21Z" />
        <path d="M13 5a1 1 0 1 0-2 0l1 9.5" />
        <path d="M12 18a2 2 0 1 0 0-4 2 2 0 0 0 0 4Z" />
      </svg>
      <span>{{ t:plugin-metronome.metronome }}</span>
    </div>
    <div class="metro-tempo-text" data-metro-tempo-text aria-live="polite">Moderato</div>
  </div>

  <div class="metro-display-section">
    <div class="metro-dots-container" data-metro-dots aria-hidden="true">
      <div class="metro-dot" data-index="0"></div>
      <div class="metro-dot" data-index="1"></div>
      <div class="metro-dot" data-index="2"></div>
      <div class="metro-dot" data-index="3"></div>
    </div>

    <div class="metro-bpm-container">
      <span class="metro-bpm-val" data-metro-bpm-val aria-live="polite">{{default_bpm}}</span>
      <span class="metro-bpm-unit">BPM</span>
    </div>
  </div>

  <div class="metro-controls">
    <div class="metro-slider-group">
      <button type="button" class="metro-btn metro-adjust-btn" data-action="decrement" aria-label="{{ t:plugin-metronome.decreaseTempo }}">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
      </button>
      
      <input 
        type="range" 
        class="metro-slider" 
        min="40" 
        max="240" 
        value="{{default_bpm}}" 
        data-metro-slider
        aria-label="{{ t:plugin-metronome.tempoSlider }}"
      />
      
      <button type="button" class="metro-btn metro-adjust-btn" data-action="increment" aria-label="{{ t:plugin-metronome.increaseTempo }}">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
      </button>
    </div>

    <div class="metro-action-group">
      <button type="button" class="metro-play-btn" data-metro-play-btn aria-label="{{ t:plugin-metronome.play }}" aria-pressed="false">
        <svg class="metro-play-icon" width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
          <polygon points="8 5 19 12 8 19 8 5"></polygon>
        </svg>
        <svg class="metro-pause-icon metro-hidden" width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
          <rect x="6" y="4" width="4" height="16" rx="1"></rect>
          <rect x="14" y="4" width="4" height="16" rx="1"></rect>
        </svg>
      </button>
    </div>
  </div>

  <div class="metro-footer">
    <div class="metro-footer-item">
      <label class="metro-label">
        <span>{{ t:plugin-metronome.beatsPerBar }}</span>
        <select class="metro-select" data-metro-select>
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4" selected>4</option>
        </select>
      </label>
    </div>

    <button type="button" class="metro-btn metro-tap-btn" data-metro-tap-btn>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
      </svg>
      <span>{{ t:plugin-metronome.tapTempo }}</span>
    </button>
  </div>
</div>
