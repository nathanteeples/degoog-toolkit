<div
  class="calc-card"
  data-calc-root
  data-initial="{{initial_expr}}"
  data-result="{{initial_result}}"
  data-ans="{{ans_value}}"
  data-angle-mode="{{angle_mode}}"
>
  <div class="calc-display" aria-live="polite">
    <div class="calc-expression" data-calc-expression>{{display_expr}}</div>
    <div class="calc-result" data-calc-result>{{display_result}}</div>
  </div>

  <div class="calc-graph" data-calc-graph hidden>
    <div class="calc-graph-head">
      <span class="calc-graph-title">Graph</span>
      <span class="calc-graph-expression">y = <span data-calc-graph-label></span></span>
    </div>
    <canvas class="calc-graph-canvas" data-calc-canvas></canvas>
  </div>

  <div class="calc-keypad" aria-label="Calculator keypad">
    <div class="calc-row">
      <div class="calc-angle-toggle" role="group" aria-label="Angle mode">
        <button class="calc-btn calc-btn--toggle" data-calc-action="rad" data-calc-rad>Rad</button>
        <button class="calc-btn calc-btn--toggle" data-calc-action="deg" data-calc-deg>Deg</button>
      </div>
      <button class="calc-btn calc-btn--sci" data-calc-action="inverse" data-calc-inverse>Inv</button>
      <button class="calc-btn calc-btn--sci" data-calc-action="open-paren">(</button>
      <button class="calc-btn calc-btn--sci" data-calc-action="close-paren">)</button>
      <button class="calc-btn calc-btn--clear" data-calc-action="clear">AC</button>
    </div>
    <div class="calc-row">
      <button class="calc-btn calc-btn--sci" data-calc-action="sin" data-calc-sin>sin</button>
      <button class="calc-btn calc-btn--sci" data-calc-action="cos" data-calc-cos>cos</button>
      <button class="calc-btn calc-btn--sci" data-calc-action="tan" data-calc-tan>tan</button>
      <button class="calc-btn calc-btn--sci" data-calc-action="ln" data-calc-ln>ln</button>
      <button class="calc-btn calc-btn--sci" data-calc-action="log" data-calc-log>log</button>
      <button class="calc-btn calc-btn--op" data-calc-action="divide">/</button>
    </div>
    <div class="calc-row">
      <button class="calc-btn calc-btn--sci" data-calc-action="pi">pi</button>
      <button class="calc-btn calc-btn--sci" data-calc-action="e">e</button>
      <button class="calc-btn calc-btn--sci" data-calc-action="sqrt" data-calc-sqrt>sqrt</button>
      <button class="calc-btn calc-btn--sci" data-calc-action="power">x^y</button>
      <button class="calc-btn calc-btn--sci" data-calc-action="factorial">x!</button>
      <button class="calc-btn calc-btn--op" data-calc-action="multiply">*</button>
    </div>
    <div class="calc-row">
      <button class="calc-btn calc-btn--digit" data-calc-action="digit-7">7</button>
      <button class="calc-btn calc-btn--digit" data-calc-action="digit-8">8</button>
      <button class="calc-btn calc-btn--digit" data-calc-action="digit-9">9</button>
      <button class="calc-btn calc-btn--sci" data-calc-action="percent">%</button>
      <button class="calc-btn calc-btn--sci" data-calc-action="ans">Ans</button>
      <button class="calc-btn calc-btn--op" data-calc-action="subtract">-</button>
    </div>
    <div class="calc-row">
      <button class="calc-btn calc-btn--digit" data-calc-action="digit-4">4</button>
      <button class="calc-btn calc-btn--digit" data-calc-action="digit-5">5</button>
      <button class="calc-btn calc-btn--digit" data-calc-action="digit-6">6</button>
      <button class="calc-btn calc-btn--digit" data-calc-action="dot">.</button>
      <button class="calc-btn calc-btn--sci" data-calc-action="x">x</button>
      <button class="calc-btn calc-btn--op" data-calc-action="add">+</button>
    </div>
    <div class="calc-row">
      <button class="calc-btn calc-btn--digit" data-calc-action="digit-1">1</button>
      <button class="calc-btn calc-btn--digit" data-calc-action="digit-2">2</button>
      <button class="calc-btn calc-btn--digit" data-calc-action="digit-3">3</button>
      <button class="calc-btn calc-btn--digit" data-calc-action="digit-0">0</button>
      <button class="calc-btn calc-btn--sci" data-calc-action="backspace">Back</button>
      <button class="calc-btn calc-btn--equals" data-calc-action="equals">=</button>
    </div>
  </div>
</div>
