<div
  class="time-card command-result"
  data-time-card="true"
  data-time-live="true"
  data-timezone="{{timezone}}"
  data-hour12="{{hour12}}"
>
  <p class="time-card__clock" data-time-clock>{{time}}</p>
  <p class="time-card__date" data-time-date>{{dateLine}}</p>
  <p class="time-card__place">{{placeLabel}}</p>
</div>
