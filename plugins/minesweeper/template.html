<div class="ms-card" data-ms-widget>
  <div class="ms-header">
    <div class="ms-title">Minesweeper</div>
    <div class="ms-difficulty-selector">
      <button class="ms-diff-btn ms-active" data-difficulty="easy" title="Easy (8x8, 10 mines)">Easy</button>
      <button class="ms-diff-btn" data-difficulty="medium" title="Medium (12x12, 20 mines)">Medium</button>
      <button class="ms-diff-btn" data-difficulty="hard" title="Hard (15x15, 40 mines)">Hard</button>
    </div>
  </div>

  <div class="ms-dashboard">
    <div class="ms-counter" data-ms-mines-display title="Mines Remaining">010</div>
    <button class="ms-face-btn" data-ms-face title="Restart Game">🙂</button>
    <div class="ms-timer" data-ms-timer-display title="Time Elapsed">000</div>
  </div>

  <div class="ms-grid-container">
    <div class="ms-grid" data-ms-grid></div>
  </div>

  <div class="ms-controls">
    <button class="ms-control-btn" data-ms-action="toggle-flag" title="Toggle flag/reveal mode for mobile">
      <span class="ms-flag-mode-icon">🚩</span>
      <span class="ms-flag-mode-text">Reveal Mode</span>
    </button>
    <button class="ms-control-btn" data-ms-action="toggle-sound" title="Toggle Sound">
      <span class="ms-sound-icon">🔊</span>
      <span class="ms-sound-text">Sound: On</span>
    </button>
    <button class="ms-control-btn" data-ms-action="reset" title="Reset board">Reset</button>
  </div>
</div>
