<div class="stocks-card stocks-card-{{trend}} slot-full-width" data-symbol="{{symbol_attr}}" data-live-updates="{{live_updates}}" data-live-interval="{{live_interval_ms}}" data-last-price="{{initial_price}}">
    <div class="stocks-summary">
        <div class="stocks-main">
            <div class="stocks-header-row">
                <div class="stocks-identity">
                    <div class="stocks-symbol-row">
                        <a
                            class="stocks-symbol"
                            href="{{source_url}}"
                            target="_blank"
                            rel="noopener"
                            >{{symbol}}</a>
                        <span class="stocks-exchange">{{exchange}}</span>
                    </div>
                    <div class="stocks-company">{{company}}</div>
                </div>

                <div class="stocks-price-block">
                    <div class="stocks-price">
                        <span class="stocks-price-value">{{price}}</span>
                        <span class="stocks-currency">{{currency}}</span>
                    </div>
                    <div class="stocks-change">{{change}}</div>
                </div>
            </div>

            <div class="stocks-details">{{details}}</div>
        </div>

        <div
            class="stocks-chart stocks-chart-{{trend}}"
            data-symbol="{{symbol_attr}}"
            data-currency="{{currency}}"
            data-price-hint="{{price_hint}}"
        >
            <div class="stocks-chart-header">
                <div class="stocks-chart-title">{{symbol}} {{ t:plugin-stocks.priceTitle }}</div>
                <div class="stocks-chart-periods" role="group" aria-label="Stock chart range">
                    <button class="stocks-period stocks-period--active" type="button" data-period="1d">1D</button>
                    <button class="stocks-period" type="button" data-period="5d">5D</button>
                    <button class="stocks-period" type="button" data-period="1mo">1M</button>
                    <button class="stocks-period" type="button" data-period="6mo">6M</button>
                    <button class="stocks-period" type="button" data-period="ytd">YTD</button>
                    <button class="stocks-period" type="button" data-period="1y">1Y</button>
                    <button class="stocks-period" type="button" data-period="5y">5Y</button>
                    <button class="stocks-period" type="button" data-period="max">Max</button>
                </div>
            </div>
            <div class="stocks-chart-body">{{sparkline}}</div>
            <div class="stocks-chart-stats" aria-live="polite">{{stats}}</div>
        </div>
    </div>
</div>
