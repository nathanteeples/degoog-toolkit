<div
  class="timer-widget"
  data-timer-widget
  data-duration-seconds="{{duration_seconds}}"
  data-mode="{{mode}}"
  data-autostart="{{autostart}}"
  data-stopwatch-cycle-seconds="{{stopwatch_cycle_seconds}}"
>
  <div class="timer-header">
    <div class="timer-tabs" role="tablist" aria-label="Timer mode">
      <button
        class="timer-tab"
        type="button"
        data-timer-mode="timer"
        role="tab"
        aria-selected="false"
      >
        <svg
          width="14"
          height="14"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <circle cx="12" cy="13" r="8" />
          <path d="M12 9v4l3 2" />
          <path d="M9 2h6" />
        </svg>
        <span>Timer</span>
      </button>
      <button
        class="timer-tab"
        type="button"
        data-timer-mode="stopwatch"
        role="tab"
        aria-selected="false"
      >
        <svg
          width="14"
          height="14"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <circle cx="12" cy="13" r="8" />
          <path d="M12 13V8" />
          <path d="M9 2h6" />
          <path d="M15 5l2-2" />
        </svg>
        <span>Stopwatch</span>
      </button>
    </div>

    <button
      class="timer-icon-btn"
      type="button"
      data-timer-action="toggle-sound"
      aria-label="Sound off"
      aria-pressed="false"
      title="Sound off"
    >
      <svg
        width="17"
        height="17"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="1.8"
        stroke-linecap="round"
        stroke-linejoin="round"
        aria-hidden="true"
      >
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" />
        <path d="M22 9l-6 6" />
        <path d="M16 9l6 6" />
      </svg>
    </button>
  </div>

  <div class="timer-body">
    <div class="timer-circle" aria-live="polite">
      <svg class="timer-svg" viewBox="0 0 120 120" aria-hidden="true">
        <circle
          class="timer-track"
          cx="60"
          cy="60"
          r="54"
          fill="none"
          stroke-width="5"
        />
        <circle
          class="timer-progress"
          data-timer-progress
          cx="60"
          cy="60"
          r="54"
          fill="none"
          stroke-width="5"
          stroke-linecap="round"
        />
      </svg>
      <span class="timer-display" data-timer-display title="Edit timer duration">
        0:00
      </span>
    </div>
  </div>

  <div class="timer-actions">
    <button
      class="timer-action-btn"
      type="button"
      data-timer-action="toggle-play"
      aria-label="Start"
    >
      <svg
        width="22"
        height="22"
        viewBox="0 0 24 24"
        fill="currentColor"
        aria-hidden="true"
      >
        <polygon points="7 5 19 12 7 19 7 5" />
      </svg>
    </button>
    <button
      class="timer-action-btn"
      type="button"
      data-timer-action="reset"
      aria-label="Reset"
    >
      <svg
        width="21"
        height="21"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        aria-hidden="true"
      >
        <path d="M3 12a9 9 0 1 0 3-6.7" />
        <path d="M3 4v6h6" />
      </svg>
    </button>
  </div>
</div>
