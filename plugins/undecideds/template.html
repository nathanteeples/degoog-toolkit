<div class="undecideds-slot" data-undecideds-slot data-active-tab="{{active_tab}}" data-die-type="{{die_type}}" data-num-min="{{num_min}}" data-num-max="{{num_max}}" data-auto-coin-result="{{auto_coin_result}}" data-auto-dice-result-d6="{{auto_dice_result_d6}}" data-auto-dice-result-d20="{{auto_dice_result_d20}}" data-auto-die-type="{{auto_die_type}}" data-auto-num-result="{{auto_num_result}}" data-auto-yesno-result="{{auto_yesno_result}}" data-auto-yesno-msg="{{auto_yesno_msg}}">
  <div class="undecideds-slot__card">
    <!-- Header Tabs -->
    <div class="undecideds-slot__tabs-carousel" data-undecideds-tabs-carousel>
      <button class="undecideds-slot__tab-nav undecideds-slot__tab-nav--prev" type="button" data-undecideds-tab-scroll="left" aria-label="Previous decision modes">
        <span aria-hidden="true">&lsaquo;</span>
      </button>
      <div class="undecideds-slot__tabs" role="tablist" data-undecideds-tabs>
        <button class="undecideds-slot__tab-btn" role="tab" data-tab="coin" aria-selected="false">
          <svg class="undecideds-slot__tab-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2" fill="none"/><path d="M12 6v12M6 12h12" stroke="currentColor" stroke-width="2"/></svg>
          <span>Coin Flip</span>
        </button>
        <button class="undecideds-slot__tab-btn" role="tab" data-tab="dice" aria-selected="false">
          <svg class="undecideds-slot__tab-icon" viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="2" stroke="currentColor" stroke-width="2" fill="none"/><circle cx="8" cy="8" r="1.5" fill="currentColor"/><circle cx="16" cy="16" r="1.5" fill="currentColor"/><circle cx="12" cy="12" r="1.5" fill="currentColor"/></svg>
          <span>Roll Die</span>
        </button>
        <button class="undecideds-slot__tab-btn" role="tab" data-tab="number" aria-selected="false">
          <svg class="undecideds-slot__tab-icon" viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="2" stroke="currentColor" stroke-width="2" fill="none"/><path d="M9 7h6M9 12h6M9 17h6" stroke="currentColor" stroke-width="2"/></svg>
          <span>Pick Number</span>
        </button>
        <button class="undecideds-slot__tab-btn" role="tab" data-tab="yesno" aria-selected="false">
          <svg class="undecideds-slot__tab-icon" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 16h-2v-2h2v2zm0-4.22h-2V7h2v6.78z" fill="currentColor"/></svg>
          <span>Yes or No</span>
        </button>
      </div>
      <button class="undecideds-slot__tab-nav undecideds-slot__tab-nav--next" type="button" data-undecideds-tab-scroll="right" aria-label="Next decision modes">
        <span aria-hidden="true">&rsaquo;</span>
      </button>
    </div>

    <!-- Contents -->
    <div class="undecideds-slot__content-wrapper">
      
      <!-- Coin Flip Panel -->
      <div class="undecideds-slot__panel" data-panel="coin" hidden>
        <div class="undecideds-slot__panel-layout">
          <div class="undecideds-slot__info">
            <div class="undecideds-slot__title" data-coin-result-text aria-live="polite">{{coin_result_label}}</div>
            <button class="undecideds-slot__btn" type="button" data-coin-flip-btn>Flip Coin</button>
          </div>
          <div class="undecideds-slot__visual">
            <div class="undecideds-slot__coin-scene">
              <div class="undecideds-slot__coin-entity" data-coin-element data-side="{{coin_result}}">
                <div class="undecideds-slot__coin-face undecideds-slot__coin-face--heads">
                  <div class="undecideds-slot__coin-design">
                    <span class="undecideds-slot__coin-border-outer"></span>
                    <span class="undecideds-slot__coin-border-inner"></span>
                    <span class="undecideds-slot__coin-symbol">H</span>
                    <span class="undecideds-slot__coin-text">HEADS</span>
                  </div>
                </div>
                <div class="undecideds-slot__coin-face undecideds-slot__coin-face--tails">
                  <div class="undecideds-slot__coin-design">
                    <span class="undecideds-slot__coin-border-outer"></span>
                    <span class="undecideds-slot__coin-border-inner"></span>
                    <span class="undecideds-slot__coin-symbol">T</span>
                    <span class="undecideds-slot__coin-text">TAILS</span>
                  </div>
                </div>
              </div>
              <div class="undecideds-slot__coin-drop-shadow"></div>
            </div>
            <div class="undecideds-slot__ticker" data-coin-ticker>{{coin_ticker}}</div>
          </div>
        </div>
      </div>

      <!-- Roll Die Panel -->
      <div class="undecideds-slot__panel" data-panel="dice" hidden>
        <div class="undecideds-slot__panel-layout">
          <div class="undecideds-slot__info">
            <div class="undecideds-slot__selector">
              <button class="undecideds-slot__toggle-btn" type="button" data-select-dice="d6">D6</button>
              <button class="undecideds-slot__toggle-btn" type="button" data-select-dice="d20">D20</button>
            </div>
            <div class="undecideds-slot__title" data-dice-result-text aria-live="polite">{{dice_result_label}}</div>
            <button class="undecideds-slot__btn" type="button" data-dice-roll-btn>{{t_roll_die}}</button>
          </div>
          <div class="undecideds-slot__visual">
            <div class="undecideds-slot__dice-scene">
              <!-- D6 Element -->
              <div class="undecideds-slot__die-d6" data-die-d6-element data-face="{{dice_result_d6}}">
                <div class="undecideds-slot__die-d6-face undecideds-slot__die-d6-face--1"><span class="undecideds-slot__die-dot"></span></div>
                <div class="undecideds-slot__die-d6-face undecideds-slot__die-d6-face--2"><span class="undecideds-slot__die-dot"></span><span class="undecideds-slot__die-dot"></span></div>
                <div class="undecideds-slot__die-d6-face undecideds-slot__die-d6-face--3"><span class="undecideds-slot__die-dot"></span><span class="undecideds-slot__die-dot"></span><span class="undecideds-slot__die-dot"></span></div>
                <div class="undecideds-slot__die-d6-face undecideds-slot__die-d6-face--4"><div class="undecideds-slot__dot-row"><span class="undecideds-slot__die-dot"></span><span class="undecideds-slot__die-dot"></span></div><div class="undecideds-slot__dot-row"><span class="undecideds-slot__die-dot"></span><span class="undecideds-slot__die-dot"></span></div></div>
                <div class="undecideds-slot__die-d6-face undecideds-slot__die-d6-face--5"><div class="undecideds-slot__dot-row"><span class="undecideds-slot__die-dot"></span><span class="undecideds-slot__die-dot"></span></div><div class="undecideds-slot__dot-row"><span class="undecideds-slot__die-dot"></span></div><div class="undecideds-slot__dot-row"><span class="undecideds-slot__die-dot"></span><span class="undecideds-slot__die-dot"></span></div></div>
                <div class="undecideds-slot__die-d6-face undecideds-slot__die-d6-face--6"><div class="undecideds-slot__dot-row"><span class="undecideds-slot__die-dot"></span><span class="undecideds-slot__die-dot"></span></div><div class="undecideds-slot__dot-row"><span class="undecideds-slot__die-dot"></span><span class="undecideds-slot__die-dot"></span></div><div class="undecideds-slot__dot-row"><span class="undecideds-slot__die-dot"></span><span class="undecideds-slot__die-dot"></span></div></div>
              </div>
              
              <!-- D20 Element -->
              <div class="undecideds-slot__die-d20" data-die-d20-element>
                <canvas class="undecideds-slot__d20-canvas" data-d20-canvas width="200" height="200" data-initial-val="{{dice_result_d20}}"></canvas>
              </div>
              <div class="undecideds-slot__dice-drop-shadow"></div>
            </div>
            <div class="undecideds-slot__ticker" data-dice-ticker>{{dice_ticker}}</div>
          </div>
        </div>
      </div>

      <!-- Pick Number Panel -->
      <div class="undecideds-slot__panel" data-panel="number" hidden>
        <div class="undecideds-slot__panel-layout">
          <div class="undecideds-slot__info">
            <div class="undecideds-slot__inputs">
              <div class="undecideds-slot__input-field">
                <label>Min</label>
                <input type="number" data-num-min-val value="{{num_min}}">
              </div>
              <div class="undecideds-slot__input-field">
                <label>Max</label>
                <input type="number" data-num-max-val value="{{num_max}}">
              </div>
            </div>
            <div class="undecideds-slot__title" data-num-result-text aria-live="polite">{{num_result_label}}</div>
            <button class="undecideds-slot__btn" type="button" data-num-pick-btn>{{t_pick_number}}</button>
          </div>
          <div class="undecideds-slot__visual">
            <div class="undecideds-slot__number-roller" data-number-roller-container data-initial-val="{{num_result}}"></div>
            <div class="undecideds-slot__ticker" data-num-ticker>range: {{num_min}} to {{num_max}}</div>
          </div>
        </div>
      </div>

      <!-- Yes or No Panel -->
      <div class="undecideds-slot__panel" data-panel="yesno" hidden>
        <div class="undecideds-slot__panel-layout">
          <div class="undecideds-slot__info">
            <div class="undecideds-slot__title" data-yesno-result-text aria-live="polite">{{yesno_msg}}</div>
            <button class="undecideds-slot__btn" type="button" data-yesno-decide-btn>Decide</button>
          </div>
          <div class="undecideds-slot__visual">
            <div class="undecideds-slot__wheel-container">
              <div class="undecideds-slot__wheel-pointer-icon"></div>
              <div class="undecideds-slot__wheel-spinner" data-wheel-spinner-element>
                <div class="undecideds-slot__wheel-slice undecideds-slot__wheel-slice--0"><span>YES</span></div>
                <div class="undecideds-slot__wheel-slice undecideds-slot__wheel-slice--1"><span>NO</span></div>
                <div class="undecideds-slot__wheel-slice undecideds-slot__wheel-slice--2"><span>YES</span></div>
                <div class="undecideds-slot__wheel-slice undecideds-slot__wheel-slice--3"><span>NO</span></div>
                <div class="undecideds-slot__wheel-slice undecideds-slot__wheel-slice--4"><span>YES</span></div>
                <div class="undecideds-slot__wheel-slice undecideds-slot__wheel-slice--5"><span>NO</span></div>
                <div class="undecideds-slot__wheel-slice undecideds-slot__wheel-slice--6"><span>YES</span></div>
                <div class="undecideds-slot__wheel-slice undecideds-slot__wheel-slice--7"><span>NO</span></div>
              </div>
            </div>
            <div class="undecideds-slot__ticker" data-yesno-ticker>{{yesno_ticker}}</div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>
