<div class="cxs-wrap slot-full-width" data-rate="{{rate_for_js}}">
    <div class="cxs-layout">
        <div class="cxs-main">
            <div class="cxs-row" id="cxs-from-row">
                <div class="cxs-flag" id="cxs-from-flag">{{from_flag}}</div>
                <div class="cxs-input-wrap cxs-input-wrap--editable">
                    <div class="cxs-label">{{t_amount}}</div>
                    <input
                        class="cxs-amount"
                        id="cxs-amount"
                        type="number"
                        value="{{amount_for_js}}"
                        min="0"
                    />
                </div>
                <button class="cxs-cur-btn" id="cxs-from-btn">
                    <div class="cxs-cur-display">
                        <div class="cxs-cur-name" id="cxs-from-name">
                            {{from_name}}
                        </div>
                        <div
                            class="cxs-cur-code"
                            id="cxs-from-code"
                            style="display: none"
                        >
                            {{from_code}}
                        </div>
                    </div>
                    <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
                        <path
                            d="M2 3.5l3 3 3-3"
                            stroke="currentColor"
                            stroke-width="1.3"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                        />
                    </svg>
                </button>
            </div>

            <div class="cxs-divider">
                <button class="cxs-swap" id="cxs-swap">
                    <span class="cxs-swap-inner">
                        <svg
                            width="13"
                            height="13"
                            viewBox="0 0 13 13"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="1.5"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                        >
                            <path
                                d="M2 4.5h9M8 2l3 2.5L8 7M11 8.5H2M5 6l-3 2.5L5 11"
                            />
                        </svg>
                    </span>
                </button>
            </div>

            <div class="cxs-row">
                <div class="cxs-flag" id="cxs-to-flag">{{to_flag}}</div>
                <div class="cxs-input-wrap cxs-input-wrap--result">
                    <div class="cxs-label">{{t_result}}</div>
                    <div class="cxs-result-line">
                        <div class="cxs-result" id="cxs-result">{{result}}</div>
                        <button
                            class="cxs-copy"
                            id="cxs-copy-result"
                            type="button"
                            aria-label="{{t_copy_result}}"
                            title="{{t_copy_result}}"
                        >
                            <svg class="cxs-copy-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                            </svg>
                            <svg class="cxs-copy-done" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                <path d="M20 6L9 17l-5-5"></path>
                            </svg>
                        </button>
                    </div>
                </div>
                <button class="cxs-cur-btn" id="cxs-to-btn">
                    <div class="cxs-cur-display">
                        <div class="cxs-cur-name" id="cxs-to-name">
                            {{to_name}}
                        </div>
                        <div
                            class="cxs-cur-code"
                            id="cxs-to-code"
                            style="display: none"
                        >
                            {{to_code}}
                        </div>
                    </div>
                    <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
                        <path
                            d="M2 3.5l3 3 3-3"
                            stroke="currentColor"
                            stroke-width="1.3"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                        />
                    </svg>
                </button>
            </div>

            <div class="cxs-rate-bar">
                <span
                    >1 <span id="cxs-rate-from">{{from_code}}</span> =
                    <span class="cxs-rate-val" id="cxs-rate-val"
                        >{{rate}} {{to_code}}</span
                    ></span
                >
                <span class="cxs-updated">
                    <span class="cxs-pulse"></span>
                    {{t_live_rate}}
                </span>
            </div>
        </div>

        <div class="cxs-chart-panel" id="cxs-chart-panel">
            <div class="cxs-chart-header">
                <div class="cxs-chart-title" id="cxs-chart-title">
                    {{from_code}} / {{to_code}}
                </div>
                <div class="cxs-chart-periods">
                    <button class="cxs-period" data-days="1">{{t_days_1}}</button>
                    <button class="cxs-period" data-days="5">{{t_days_5}}</button>
                    <button
                        class="cxs-period cxs-period--active"
                        data-days="30"
                    >
                        {{t_days_30}}
                    </button>
                    <button class="cxs-period" data-days="365">{{t_days_365}}</button>
                    <button class="cxs-period" data-days="1825">{{t_days_1825}}</button>
                    <button class="cxs-period" data-days="max">{{t_days_max}}</button>
                </div>
            </div>
            <div class="cxs-chart-body" id="cxs-chart-body">
                <div class="cxs-chart-loading">{{t_loading_chart}}</div>
            </div>
            <div class="cxs-chart-stats" id="cxs-chart-stats"></div>
        </div>
    </div>

    <div class="cxs-quick">
        <button class="cxs-q" data-v="10">10</button>
        <button class="cxs-q" data-v="25">25</button>
        <button class="cxs-q" data-v="50">50</button>
        <button class="cxs-q" data-v="100">100</button>
        <button class="cxs-q" data-v="250">250</button>
        <button class="cxs-q" data-v="500">500</button>
        <button class="cxs-q" data-v="1000">1,000</button>
        <button class="cxs-q" data-v="2500">2,500</button>
        <button class="cxs-q" data-v="5000">5,000</button>
        <button class="cxs-q" data-v="10000">10,000</button>
    </div>

    <div class="cxs-pairs-label">{{t_popular_pairs}}</div>
    <div class="cxs-pairs" id="cxs-pairs">{{pairs_html}}</div>

    <!-- Currency picker dropdown -->
    <div class="cxs-picker" id="cxs-picker" style="display: none">
        <div class="cxs-picker-top">
            <input
                class="cxs-picker-search"
                id="cxs-picker-search"
                placeholder="{{t_search_currency}}"
                autocomplete="off"
            />
            <button class="cxs-picker-close" id="cxs-picker-close">
                &#x2715;
            </button>
        </div>
        <div class="cxs-picker-list" id="cxs-picker-list"></div>
    </div>
</div>
