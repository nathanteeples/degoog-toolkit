<div id="results-page" class="degoog-fullwidth-slot-shell"
     data-t-settings="{{ t:theme-literallyapple.settings }}"
     data-t-prev="{{ t:theme-literallyapple.prev }}"
     data-t-prev-image="{{ t:theme-literallyapple.prevImage }}"
     data-t-next="{{ t:theme-literallyapple.next }}"
     data-t-next-image="{{ t:theme-literallyapple.nextImage }}"
     data-t-more-options="{{ t:theme-literallyapple.moreOptions }}"
     data-t-download="{{ t:theme-literallyapple.download }}"
     data-t-copy-link="{{ t:theme-literallyapple.copyLink }}"
     data-t-close="{{ t:theme-literallyapple.close }}"
     data-t-image-copied="{{ t:theme-literallyapple.imageCopied }}"
     data-t-link-copied="{{ t:theme-literallyapple.linkCopied }}"
>
    <div id="results-header"></div>
    <div id="results-tabs"></div>
    <div id="results-meta"></div>
    <div id="image-filters-bar"></div>
    <div id="results-layout">
        <div id="slot-above-results"></div>
        <div id="results-main">
            <div id="at-a-glance"></div>
            <div id="results-list"></div>
            <div id="slot-below-results"></div>
            <div id="pagination"></div>
        </div>
        <div id="sidebar-col">
            <div id="slot-above-sidebar"></div>
            <div id="results-sidebar"></div>
            <div id="slot-below-sidebar"></div>
        </div>
        <div id="media-preview-panel"></div>
    </div>
</div>
<div id="img-lightbox"></div>
<div class="mp2-toast" id="mp2-toast" aria-live="polite" aria-atomic="true"></div>
<script src="/themes/literallyapple/scripts/search.js?v=__APP_VERSION__"></script>
