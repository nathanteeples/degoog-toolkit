<div id="results-page" class="degoog-fullwidth-slot-shell"
     data-t-settings="{{ t:theme-literallygoogle.settings }}"
     data-t-prev="{{ t:theme-literallygoogle.prev }}"
     data-t-prev-image="{{ t:theme-literallygoogle.prevImage }}"
     data-t-next="{{ t:theme-literallygoogle.next }}"
     data-t-next-image="{{ t:theme-literallygoogle.nextImage }}"
     data-t-more-options="{{ t:theme-literallygoogle.moreOptions }}"
     data-t-download="{{ t:theme-literallygoogle.download }}"
     data-t-copy-link="{{ t:theme-literallygoogle.copyLink }}"
     data-t-close="{{ t:theme-literallygoogle.close }}"
     data-t-image-copied="{{ t:theme-literallygoogle.imageCopied }}"
     data-t-link-copied="{{ t:theme-literallygoogle.linkCopied }}"
>
    <div id="results-header"></div>
    <div id="results-tabs"></div>
    <div id="results-meta"></div>
    <div id="results-layout">
        <div id="slot-above-results"></div>
        <div id="results-main">
            <div id="at-a-glance"></div>
            <div id="results-list"></div>
            <div id="slot-below-results"></div>
            <div id="pagination"></div>
        </div>
        <div id="sidebar-col">
            <div class="sticky">
                <div id="slot-above-sidebar" data-position="above-sidebar"></div>
                <div id="results-sidebar"></div>
                <div id="slot-below-sidebar" data-position="below-sidebar"></div>
            </div>
        </div>
        <div id="image-filters-bar"></div>
        <div id="media-preview-panel"></div>
    </div>
</div>
<div id="img-lightbox"></div>
<div class="mp2-toast" id="mp2-toast" aria-live="polite" aria-atomic="true"></div>
<script src="/themes/literallygoogle/scripts/search.js?v=__APP_VERSION__"></script>
