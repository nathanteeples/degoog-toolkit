<span class="lg-result-sources" hidden aria-hidden="true">{{#each sources}}{{ . }}|{{/each sources}}</span>
<div class="image-thumb-wrap">
  <img class="image-thumb" src="{{ thumbnail_url }}" data-fallback="{{ fallback_url }}" alt="{{ title }}" loading="lazy" onerror="this.dataset.triedFallback||this.dataset.fallback===''?this.closest('.image-card').style.display='none':(this.dataset.triedFallback='1',this.src=this.dataset.fallback)">
</div>
<div class="image-info">
  <span class="image-title">{{ title }}</span>
  <span class="image-source">{{ hostname }}</span>
</div>
